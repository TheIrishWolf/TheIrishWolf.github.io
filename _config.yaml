# Site settings
title: TheIrishWolf's Portfolio
description: Portfolio of projects in fabrication, CAD design, and engineering.
author: TheIrishWolf
email: darkmarksman5@gmail.com
url: "https://TheIrishWolf.github.io"
baseurl: ""

# Social links
github_username: TheIrishWolf
# linkedin_username: yourlinkedin
# instagram_username: yourinstagram

# Theme
theme: minima # or jekyll-theme-minimal or remote_theme: pages-themes/hacker@v0.2.0
plugins:
- jekyll-remote-theme

# Build settings
markdown: kramdown
permalink: pretty

# Navigation links
header_pages:
  - index.md
  - projects.md
  - about.md
  - contact.md

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections for projects
collections:
  images:
    output: true
    permalink: /images/:name/
  projects:
    output: true
    permalink: /projects/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: project
